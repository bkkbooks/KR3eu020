body:
  text: 卷五頭痛眩暈總括頭痛痰熱風濕氣或兼氣血虛而疼在右屬氣多痰熱左屬血少更屬風因風眩暈頭風痛熱暈煩渴火上攻氣鬱不伸痰嘔吐濕則重痛虛動增注頭痛屬痰屬熱屬風屬濕屬氣或兼氣虛血虛因風而痛謂之頭風必眩暈因熱而痛暈者則煩渴因氣鬱而痛暈者則志意不伸因痰而痛暈者則嘔吐痰涎因濕而痛暈者則頭重不起因虛而痛暈者動則更痛更暈也頭痛眩暈死證真頭腦痛朝夕死手足厥逆至節青瀉多眩暈時時冒頭卒大痛目瞀凶注真頭痛痛連腦內手足青冷至肘膝之節朝發夕死凡頭痛眩暈時時迷冒及頭目卒然大痛目視不見或瀉多之後皆凶證也蓽茇散芎芷石膏湯頭風嗅鼻熱蓽茇濕盛瓜蒂入茶茗風盛日久三聖散內服芎芷石膏靈芎芷石膏菊羌藁苦加細辛風防荊熱加梔翹芩薄草便祕尿紅硝黃攻注一切頭風兼熱者以蓽茇散嗅鼻即蓽茇一味為末用豬膽汁拌過嗅之作嚏立愈一切頭風兼濕者以瓜蒂松蘿茶二味為末嗅之出黃水立愈頭風風盛時發日久不愈則多令人目昏以三聖散嗅之方在中風門內用芎芷石膏湯即芎芷石膏菊花羌活藁本也苦痛者加細辛風盛目昏加防風荊芥穗熱盛加梔子連翹黃芩薄荷甘草大便祕小便赤加硝黃攻之自愈也茶調散清震湯滾痰丸人參芎附湯風熱便利茶調散雷頭荷葉蒼與升痰熱滾痰芎作引虛寒真痛附參芎注雷頭風痛頭面疙瘩耳聞雷聲宜清震湯即荷葉蒼朮升麻也人參芎附湯即人參川芎川附也芎犀丸偏正頭風芎犀丸血虛四物薄羌天氣虛補中加芎細氣逆降氣黑錫丹注血虛面少血色或久脫血也天天麻也降氣蘇子降氣湯也芎麻湯半夏白朮天麻湯欲吐暈重風痰痛芎麻湯下白丸寧虛者六君耆干柏天麻曲糵澤蒼同注麻天麻也白丸青州白丸子也虛者謂風痰兼氣虛者宜半夏白朮天麻湯即六君子加黃耆乾薑黃柏天麻神麯麥糵澤瀉蒼朮也荊穗四物湯頭暈頭痛同一治血虛物穗氣補中氣血兩虛十全補上盛下虛黑錫靈注頭暈之虛實寒熱諸證同乎頭痛一治法也其有因血虛宜用荊穗四物湯即當歸川芎白芍熟地黃荊芥穗也氣虛宜用補中益氣湯氣血兩虛宜用十全大補湯上盛下虛宜用黑錫丹眼目總括目為五臟六腑精氣白筋黑骨精瞳血為眥絡肉約束裹擷系屬腦項中經熱腠開因風入合邪上攻赤腫疼輕者外障生雲翳重者積熱頓傷睛注經曰五臟六腑之精氣皆上注於目而為之精精之窠為眼氣之精為白眼筋之精為黑眼骨之精為瞳子血之精為絡眥肉之精為約束即眼胞也裹擷筋骨血氣之精而與脈繫上屬於腦後出於項中因經熱蒸開腠理故風邪得以入之風熱之邪合上攻於目赤腫疼痛輕者則為外障或暴生雲翳重者則積熱之甚陡然痛傷睛也外障病證火眼赤腫淚澀痛硬腫多熱軟多風瞼粟爛弦雞蜆肉胬肉赤脈貫瞳睛血灌瞳人高突起旋螺尖起蟹睛疼拳毛風淚風癢極赤膜下垂黃膜沖注風熱上攻目赤腫痛多淚隱澀難開火眼也腫而硬者屬熱盛也宜先下之腫而軟者屬風盛也宜先發散兩瞼上下初生如粟漸大如米或赤或白不甚疼痛謂之瞼生風粟兩瞼黏睛赤爛癢痛經年不愈謂之爛弦風又名赤瞎瞼內如雞冠蜆肉翻出視物阻礙痛楚羞明謂之雞冠蜆肉此皆脾經風熱為病也兩眥筋膜努出謂之胬肉攀睛兩眥赤脈漸漸侵睛謂之赤脈貫睛兩眼混赤如朱痛如針刺謂之血灌瞳人兩眼癢痛忽然突起謂之突起睛高目中大痛忽生翳膜狀如旋螺謂之旋螺尖起目中大痛忽然瞳睛努如蟹目謂之蟹睛疼痛又名損翳此皆肝心二經積熱也兩瞼燥急睫毛倒刺謂之倒睫拳毛兩目衝風淚出涓涓冬月尤甚謂之迎風流淚兩目連眥癢極不痛謂之風癢難任目中從下忽生黃膜侵睛疼痛謂之黃膜上衝目中從上忽生赤膜垂下遮睛謂之赤膜下垂又名垂簾翳此皆心肝脾三經風熱為病也內障病證內障頭風五風變珠白黃緑不光明頭風痛引目無淚相注如坐暗室中緑風頭旋連鼻痛兩角相牽引目疼時或白花紅花起同緑黑花為黑風烏花不旋漸昏暗黃風雀目久金睛青風微旋不癢痛青花轉轉目昏蒙注內障之病每因頭風五風變成初病瞳珠漸漸變色睛里隱隱似翳或白或黃或緑雖與不患之眼相似然無精彩光明射人病頭風者發則頭痛引目無淚或左目或右目或先左目或後右目相注不定如坐暗室之中此頭風傷目之漸也緑風者頭旋兩角連鼻相牽引目疼痛時或見起白花紅花此緑風傷目之漸也黑風者證同緑風時時見起黑花此黑風傷目之漸也烏風者亦同黑風但不旋暈而見烏花漸漸昏暗此烏風傷目之漸也黃風者久病雀目瞳睛金色此黃風傷目之漸也青風者頭微旋不癢不痛但見青花轉轉日漸昏蒙此青風傷目之漸也菊花通聖散洗刀散暴發火眼通聖菊外障等證減加方風盛羌加防麻倍熱盛加連倍硝黃痛生翳膜多傷目洗刀更入細獨羌元參木賊白蒺藜草決蟬蛻蔓青葙注菊花通聖散即防風通聖散加菊花也洗刀散即本方更加細辛羌獨蔓荊青葙子等藥也內外障治外障無寒一句了五輪變赤火因生內障有虛心腎弱故如不病損光明火能外鑑水內照養神壯水自收功五風內變諸翳障眼科自有法能攻注外障目病子和曰目不因火不病所以五輪變赤氣輪白睛火乘肺也肉輪目胞火乘脾也風輪黑睛火乘肝也水輪瞳人火乘腎也血輪兩眥火自甚也故能治火者一句便了也治火之法在藥則鹹寒吐之下之在針則神庭上星囟會前項百會刺之翳者可使立退痛者可使立已昧者可使立明腫者可使立消矣內障目病雖亦無寒然有虛也虛或兼熱亦屬虛熱故不赤腫疼痛如不病眼人但不精彩光明也心虛則神不足神者火也火內暗而外明故不能外鑑而失其光明也腎虛則精不足精者水也水外暗而內明故不能內照而失其光明也心虛者則養心神腎虛者則壯腎水自可收功於不明也其五風內變諸翳如圓翳冰翳清翳澀翳散翳橫翳浮翳沉翳偃月棗花黃心黑風等翳俱列在眼科方書自有治法難以盡述此特其大概耳牙齒口舌總括牙者骨余屬乎腎牙齦手足兩陽明齒長豁動為腎憊牙疼胃火風寒蟲不怕冷熱為風痛火腫喜冷得寒疼寒不腫蛀喜熱飲蟲牙蝕盡一牙生注牙齒者骨之餘屬乎腎也若無故齒長疏豁而動則為腎衰憊也上牙齦屬足陽明下牙齦屬手陽明牙痛皆牙齦作痛惟寒牙痛則為客寒犯腦多頭連齒痛為寒邪也故喜熱飲不腫不蛀也余者皆為胃火邪風濕熱也火牙疼多腫喜飲冷得寒則更疼者讎仇之意也蟲牙則一牙作痛蝕盡一牙又蝕一牙作痛也骨槽風牙疳瘡骨槽齦頰腫硬疼牙齦腐爛出血膿牙疳腫硬潰血臭皆因痘疹癖疾成注骨槽風者牙齦連頰硬腫疼痛牙齦腐爛出血膿也牙疳以骨槽潰後腫硬不消然出臭血而不出膿水也且皆痘疹癖疾之後而成也清胃散清胃血分火牙痛生地歸連升牡饒氣分宜加荊防細積熱涼膈入升膏注胃火牙痛赤腫出血者則為血分宜用清胃散即生地當歸黃連升麻牡丹皮出饒者倍加升麻丹皮也若腫痛牙齦不出血者則為氣分宜加荊芥防風細辛以散其熱若腸胃積熱腫痛爛臭宜用涼膈散加升麻石膏以下其熱可也溫風散溫風風牙歸芎細蓽茇藁芷露蜂房寒牙痛加羌麻附半服含漱吐涎良注不甚腫痛不怕冷熱為風牙痛宜用溫風散即當歸川芎細辛蓽茇藁本白芷露蜂房也不腫痛甚喜飲熱湯為寒牙痛宜本方再加羌活麻黃川附子溫而散之二方俱服一半含漱一半連涎吐之自好也一笑丸玉池散熏藥諸牙椒巴飯丸咬玉池藁芷骨槐辛歸芎大豆升防草蟲牙蔥韭子煙燻注諸牙謂諸牙痛也均宜一笑丸即川椒七粒為末巴豆一粒去皮研勻飯為丸綿裹咬痛處吐涎即止均宜用玉池散即藁本白芷地骨皮槐花細辛當歸川芎黑豆升麻防風甘草煎湯熱漱冷吐蟲牙亦宜此咬漱更須用韭子或蔥子置小爐中燒之擱在大水碗內覆以漏斗口向蟲牙痛處熏之其蟲極小皆落水碗之中纍效蕪荑消疳湯牙疳雖有專科治然皆未曉纍攻神能食便軟猶當下雄荑黃薈二連芩注牙疳一病殺人最速雖有專科然皆未曉纍攻之法纍攻者今日攻之明日又攻之以腫硬消黑色變臭氣止為度若不能食或隔一日或隔二三日攻之攻之後漸能食不必戒口任其所食雖大便溏仍量其輕重攻之自見其神若竟不思食難任攻下則死證也攻藥用蕪荑消疳湯即雄黃蕪荑生大黃蘆薈川黃連胡黃連黃芩也口舌證治唇口屬脾舌屬心口舌瘡糜蘊熱深口淡脾和臭胃熱五味內溢五熱淫木舌重舌舌腫大唇腫唇瘡緊繭唇暴發赤痛多實熱淡白時痛每虛因注口舌生瘡糜爛名曰口糜乃心脾二經蘊熱深也平人口淡故曰脾和口出氣臭則為胃熱不因食五味而口內溢酸味者乃肝熱淫脾也苦味者心熱淫脾也甘味者本經熱自淫也辛味者肺熱淫脾也鹹味者腎熱淫脾也木舌謂舌腫硬不痛也重舌謂舌下腫似舌也舌腫謂舌腫大也唇腫謂唇腫痛厚也唇瘡謂唇腫潰裂成瘡也緊繭唇謂唇緊小燥裂也以上之證皆屬心脾胃經蘊熱若暴發赤腫痛甚多為實熱宜以涼膈散梔子金花湯急下其熱可即愈也若日久色淡瘡白時痛不痛每屬虛熱宜清心蓮子飲知柏四物湯補中兼清可也或服涼藥久不愈者以七味地黃湯冷服引火歸原不效甚者加附子可立愈也咽喉總括胸膈風熱咽喉痛邪盛單雙乳蛾生熱極腫閉名喉痹語言難出息不通痰盛涎繞喉間響內外腫閉纏喉風喉痹纏喉皆危證潰後無膿腫閉凶注胸膈上有風熱則咽喉腫痛風熱之邪若盛則生單雙乳蛾在會厭兩傍高腫似乳蛾故名也熱極則腫閉湯水不下言語難出呼吸不通名曰喉痹若熱極更兼痰盛則痰涎繞於喉間聲響咽喉內外腫閉湯水不下名曰纏喉風皆危病也或服藥或吹藥或針刺潰破出膿血則愈若潰後不出膿血仍然腫閉湯水不下則死矣如意勝金錠雄黃解毒丸咽痛消毒涼膈散單雙乳蛾刺血痊喉痹纏喉勝金錠急攻痰熱解毒丸昏噤牙關湯不下多鼻吹灌度喉關吐下之後隨證治潰爛珍珠散上安注咽喉初起腫痛宜用消毒涼膈散即防風荊芥牛蒡子梔子連翹薄荷黃芩甘草大黃芒硝也單雙乳蛾則刺少商出血在左刺左在右刺右在左右刺左右也喉痹纏喉初起病勢未甚或狀如傷寒宜服如意勝金錠即硫黃川芎臘茶火硝薄荷生川烏生地黃各等分為末蔥自然汁合為錠重一錢薄荷湯磨化服甚者連進三次若痰涎壅盛喉間內外腫閉湯水難下病勢危急宜用雄黃解毒丸即雄黃水飛鬱金細末各二錢半巴豆仁肥白者十四粒微去油以成散為度合均醋糊為丸如緑豆茶清下七丸便利吐痰則愈若昏冒牙關噤急湯不能下將藥用醋化開十丸按中風門之法嗅入鼻內吐下則愈其後隨證調治可也若雖愈咽喉潰爛以珍珠散上之即好吹喉七寶散咽喉諸證七寶散消皂蠍雄硼二礬細研如塵取一字吹中患處效如神注咽喉諸證謂咽喉腫痛單雙乳蛾喉痹纏喉也七寶散即火硝牙皂全蠍雄黃硼砂白礬膽礬也肩背總括通氣防風湯通氣太陽肩背痛羌獨藁草蔓防芎氣滯加木陳香附氣虛升柴參耆同血虛當歸白芍藥血瘀薑黃五靈紅風加靈仙濕二術研送白丸治痰凝注李杲羌活勝濕湯又名通氣防風湯治太陽經風濕肩背痛即羌活獨活藁本甘草蔓荊子防風川芎也兼氣鬱滯痛者則常常作痛加木香陳皮香附也氣虛郁痛者則時止時痛加升麻柴胡人參黃耆也血虛郁痛者則夜甚時止加當歸白芍藥也血瘀郁痛者則夜痛不止加薑黃五靈脂紅花也風氣鬱盛者痛則項肩強加威靈仙也濕氣鬱甚者痛則肩背重加蒼朮白朮也痰風凝郁者痛則嘔眩用本湯研送青州白丸子也心腹諸痛總括心痛岐骨陷處痛橫滿上胸下胃脘當臍脾腹連腰腎少腹小大腸脅肝蟲痛時止吐清水疰即中惡寒外干悸分停飲與思慮食即停食冷內寒水停痰飲熱胃火氣即氣滯血瘀緣隨證分門檢方治真心黑厥至節難注岐骨陷處痛名心痛橫滿連胸名肺心痛下連胃脘名胃心痛連臍名脾心痛連腰名腎心痛連少腹名大腸小腸痛連脅名肝心痛時止吐清水名蟲心痛中惡腹痛名疰痛寒邪外干名中寒痛悸而痛名悸心痛水停心下屬飲也思慮傷心屬傷也停食痛停水痛停痰痛胃火痛氣滯痛血瘀痛皆不死之證也當分門施治惟真心痛面色黑四肢逆冷至節死證也化滯丸清中湯攻濕積熱求化滯攻寒積水備急丹火痛二陳梔連蔻蟲用烏梅飲控涎注化滯丸成方也清中湯即陳皮半夏茯苓甘草薑炒山梔黃連草豆蔻也木香流氣飲七情鬱結流氣飲思慮悸痛歸脾湯內寒理中外五積疰痛備急血抵當小建中湯木來乘土腹急痛緩肝和脾小建中血虛寒痛羊肉治氣虛理中加陳青注羊肉謂羊肉湯也烏頭梔子湯劫諸郁痛烏梔子劫而復痛入元明已經吐下或虛久急痛欲死求鴉鳴注諸郁謂諸寒火鬱而痛也寒多炮川烏為主熱多薑炒梔子為主元明元明粉也鴉鳴謂以真鴉片末或加麝香少許飯丸如桐子大每服三五丸引在本草名一粒金丹胸脅總括栝蔞薤白白酒湯栝蔞薤白半夏湯栝蔞薤白白酒湯胸痹胸背痛難當喘息短氣時咳唾難臥仍加半夏良注栝蔞薤白白酒湯即栝蔞實小根菜水白酒煎也顛倒木金散胸痛氣血熱飲痰顛倒木金血氣安飲熱大陷小陷治頑痰須用控涎丹注胸痛之證須分屬氣屬血屬熱飲屬老痰顛倒木金散即木香鬱金也屬氣鬱痛者以倍木香君之屬血鬱痛者以倍鬱金君之為末每服二錢老酒調下虛者加人參更效胸中有痰飲熱作痛者輕者小陷胸湯重者大陷胸湯丸治之若吐唾稠黏痰盛則用控涎丹枳芎散枳橘散柴胡疏肝湯加味逍遙散左金丸當歸龍薈丸脅痛左屬瘀留血輕金芎枳草重攻右屬痰氣重逐飲片薑橘枳草醫輕肝實太息難轉側肝虛作痛引肩胸實用疏肝柴芍草香附枳陳與川芎肝虛逍遙加芎細陳皮生薑緩其中肝虛左金實龍薈一條扛起積食攻注左屬瘀血輕謂瘀血輕者宜用枳芎散重攻謂瘀血重者宜以攻血之劑也枳芎散即枳殼撫芎鬱金甘草也右屬痰氣重逐飲謂以控涎十棗逐痛之重者也枳橘散即枳殼橘皮片子薑黃甘草醫痛之輕者也柴胡疏肝散即柴胡白芍甘草香附枳殼陳皮川芎也逍遙散即白朮茯苓當歸白芍柴胡炙草薄荷少許加川芎細辛陳皮生薑也左金即左金丸吳茱萸黃連也肝實火旺者當歸龍薈丸積食者以化滯丸積飲者以控涎丹腰痛總括腰痛腎虛風寒濕痰飲氣滯與血瘀濕熱閃挫凡九種面忽紅黑定難醫注腰痛之證其因不同有腎虛有風有寒有濕有痰飲有氣滯有血瘀有濕熱有閃挫凡患腰痛極甚而面色忽紅忽黑是為心腎交爭難治之證也安腎丸腰痛悠悠虛不舉寄生青娥安腎丸胡蘆骨脂川楝續桃杏茴苓山藥鹽注寄生謂獨活寄生湯青娥丸即補骨脂杜仲核桃仁也安腎丸即胡蘆巴補骨脂川楝肉川續斷桃仁杏仁小茴香茯苓山藥也鹽鹽湯為引也羌活勝濕湯通經丸腰痛屬寒得熱減五積吳萸桃杜安寒濕重著勝濕附內實通經硫面牽風痛無常掣引足經虛當用寄生痊經實非汗不能解續命湯加牛杜穿注五積散加吳茱萸桃仁杜仲羌活勝濕湯即防風通氣湯加附子也通經丸即硫黃黑牽牛頭末麥面合丸煮浮起服方出本草小續命湯加牛膝杜仲炒穿山甲也通氣散活絡丹氣滯閃挫通氣散木陳穿索草茴牽血瘀不移如錐刺日輕夜重活絡丹注通氣散即木香陳皮穿山甲元胡索甘草小茴香白牽牛也活絡丹即川烏草烏南星地龍乳香沒藥也加五靈脂麝香尤效蒼柏散煨腎散濕熱熱注足蒼柏二妙牛杜己瓜芎腰如物覆濕痰蓄煨腎椒鹽遂有功注蒼柏散即蒼朮黃柏牛膝杜仲防己木瓜川芎也煨腎散即豬腰子剖開入川椒食鹽甘遂末濕紙裹煨熟酒食之小便閉癃遺尿不禁總括膀胱熱結為癃閉寒虛遺尿與不禁閉即尿閉無滴出少腹脹滿痛難伸癃即淋瀝點滴出莖中澀痛數而勤不知為遺知不禁石血膏勞氣淋分注膀胱熱結輕者為癃重者為閉膀胱寒虛輕者為遺尿重者為不禁閉者即小便閉無點滴下出故少腹滿脹痛也癃者即淋瀝點滴而出一日數十次或勤出無度故莖中澀痛也不知而尿出謂之遺尿知而不能固謂之小便不禁小便閉遺尿死證嘔噦尿閉為關格若出頭汗命將傾傷寒狂冒遺尿死尿閉細澀不能生注上為嘔噦不入下為小便不通則陰陽之氣關格若出頭汗則為陽絶故命傾也傷寒狂冒屬陽邪盛遺尿屬陰不守若尿閉脈細澀知陰亦竭故俱死也治癃閉尉吐汗三法陰陽尉臍蔥白麝冷熱互尉尿自行宣上木通蔥探吐達外蔥湯熏汗通注用蔥白一斤細銼入麝香五分拌勻分二包置臍上先以炭火尉斗尉之半炷香時換一包以冷水尉斗尉之互相遞尉以尿通為度服諸藥不效或服藥即時吐出或服攻下藥不利宜用宣上法以木通老蔥煎湯服頃時探吐再服再吐以尿通為度服諸藥不效或身無汗宜用達外法以蔥湯入木桶內令病人坐於杌上沒臍為度匝腰繫裙以覆之少時汗出其尿自出欲尿時不可出桶即於桶內尿之恐出桶氣收而尿又回也小便不通通關丸熱實不化大便硬癃閉八正木香痊陽虛不化多厥冷惡寒金匱腎氣丸陰虛不化發午熱不渴知柏桂通關氣虛不化不急滿倦怠懶言春澤煎注小便不通熱實者宜用八正散加木香陽虛者宜用金匱腎氣丸陰虛者宜用通關丸即知母黃柏肉桂少許也氣虛宜用春澤湯即五苓散加人參也八正散石淋猶如磏結鐺是因濕熱煉膀胱一切熱淋八正扁通滑梔瞿草車黃注八正散即萹蓄木通瞿麥梔子滑石甘草車前子大黃也小薊飲子血淋心遺熱小腸實熱仍宜下之良清熱小薊梔滑淡歸藕通蒲草地黃注淡淡竹葉也藕藕節也蒲蒲黃也海金沙散鹿角霜丸膏淋尿濁或如涕精尿俱出海草滑熱盛八正加蒼朮虛用秋苓鹿角佳注海海金沙也秋秋石也苓茯苓也鹿角鹿角霜糯米糊為丸也加味八正散氣淋肺熱難清肅八正石韋木葵沉內傷氣虛不能化五苓益氣自通神注八正散加石韋木香冬葵子沉香五苓合補中益氣湯補中益氣湯合五苓散清心蓮子飲勞淋內傷補中苓腎氣知柏過淫成勞心清心蓮地骨耆芩車麥草參苓注內傷勞脾用補中益氣湯合五苓散勞腎陽虛用金匱腎氣湯陰虛用知柏地黃湯思慮勞心用清心蓮子飲是方即蓮子地骨皮黃耆黃芩車前子麥門冬生甘草人參白茯苓也琥珀散痰淋七氣白丸子熱燥清熱用滋陰諸淋平劑琥珀木葵蓄通滑歸鬱金注七氣湯見諸氣門青州白丸子見類中風門滋陰通關丸也木木香也葵冬葵子也桂附地黃丸補中益氣湯加白果方坎離既濟湯加山萸肉五味子方遺尿不禁淋尿白桂附補中白果煎補之不應或尿赤生地知柏萸味攢注遺尿不禁及諸淋尿色白者皆屬寒虛寒者用桂附地黃湯加白果虛者用補中益氣湯加白果凡遺尿不禁諸淋尿色赤者或補之不應者亦有熱虛用坎離既濟湯即生地知母黃柏加山萸肉五味子也大便燥結總括熱燥陽結能食數寒燥陰結不食遲實燥食積熱結胃食少先硬後溏脾氣燥阻隔不降下血燥乾枯老病虛風燥久患風家候直腸結硬導之宜注熱燥即陽結也能食而脈浮數有力與三陽熱證同見者也寒燥即陰結也不能食而脈沉遲有力與三陰寒證同見者也實燥即胃實硬燥也與腹滿痛同見者也虛燥即脾虛先硬後溏之燥也與少氣腹縮同見者也氣燥即氣道阻隔之燥也與噎膈反胃同見者也血燥即血液乾枯之燥也與久病老虛同見者也風燥即久患風病之燥也從風家治直腸結即燥屎巨硬結在肛門難出之燥也從導法治之結燥治法溫脾湯握藥法熱實脾約三承氣寒實備急共溫脾大黃薑附桂草朴寒虛硫半握藥醫虛燥益氣硝黃入血燥潤腸與更衣氣燥四磨參利膈風燥搜風順氣宜注溫脾湯即大黃乾薑附子肉桂甘草厚朴也硫半丸即硫黃半夏也握藥即巴豆仁乾薑韭子良薑硫黃甘遂白檳榔各五分為末合均飲和分二粒先以花椒湯洗手麻油塗手心握藥移時便瀉欲止則以冷水洗手益氣即補中益氣湯加大黃朴硝潤腸丸即當歸生地枳殼桃仁火麻仁各等分為末蜜丸米飲早服更衣丸即生蘆薈硃砂末等分飯丸酒服四磨湯即人參烏藥沉香檳榔也參利膈即人參利膈丸也搜風順氣即搜風順氣丸也
