body:
  text: 卷中風總括風從外中傷肢體痰火內發病心官體傷不仁與不用心病神昏不語言當分中絡經腑臟更審虛實寒熱痰脫證撒手為脾絶開口眼合是心肝遺尿腎絶鼾聲肺閉證握固緊牙關初以通關先取嚏痰壅不下吐為先注風謂虛邪賊風從外而中傷人四肢軀體故名曰中風痰火謂痰火從內而發病人心主之官故名曰痰火體中風邪輕則頑麻不仁重則癱瘓不用心病痰火輕則舌強難語重則痰壅神昏此證或內或外單病輕兼病重當細辨其中絡中經中腑中臟及中經絡兼中腑臟並細審其兼虛兼實兼寒兼熱兼痰與夫脫證閉證之淺深緩急而治之凡初中宜先用通關散取嚏有嚏可治無嚏多死口噤者用開關散擦牙軟之痰涎壅盛用諸吐法湧之若口噤不開湯藥不能下咽者則將應服之藥隨引調如麵茶含在不病人口內用葦管或筆管插入病人鼻孔使氣連藥吹之其藥自能入咽不可用金器撬之恐傷齒也按中風一證分中血脈中腑中臟始自李東垣中血脈者大秦艽湯中腑者小續命湯中臟者三化湯然從未見有三化湯中臟之證惟金匱書中分為四證曰絡曰經曰腑曰臟其說最為的當可為後世法蓋口眼喎斜肌膚不仁邪在絡也左右不遂筋骨不用邪在經也昏不識人便尿阻隔邪在腑也神昏不語唇緩涎出邪在臟也學者細閲諸家之論自知不謬云爾中風死候寸口脈平卒中死生氣獨絶暴脫之五臟幾息呼吸泯譬如墮溺豈能期脈來一息七八至不大不小尚能醫大小浮晝沉夜死脈絶不至死何疑脫證並見皆死候搖頭上竄氣長噓喘汗如油痰拽鋸肉脫筋痛發枯直注寸口脈平謂寸關尺脈俱平之人忽然卒中而死者皆因中邪太甚閉塞九竅天真之氣不能與人之生氣相通則獨絶於內也譬如墮跌溺水豈能預期其死耶脈來一息七八至者不大不小雖困可治若大而無倫小而如纖浮主晝死沉主夜死不可治也五臟脫證若三臟四臟並見及搖頭上竄等證皆死候也通關散開關散熏鼻法解語法通關星皂細荷半開關烏梅冰片南巴油紙皂煙燻鼻龜尿舌下點難言注通關散南星皂角細辛薄荷生半夏為末吹鼻有嚏可治開關散烏梅肉冰片生南星為末擦牙其噤可開巴豆油紙卷皂角末燒煙燻入鼻內人事自省取龜尿點在舌下言語自易三聖散瓜蒂散全蠍散五元散巴礬丸無汗吐宜防藜蒂有汗瓜蒂入蠍全重劑藜豆礬皂膽痰壅吐以巴礬丸注痰涎壅盛無汗表實用三聖散即防風藜蘆瓜蒂吐之有汗裡實用瓜蒂散即瓜蒂赤小豆或用全蠍散即瓜蒂散加全蠍吐之此皆吐之輕劑也甚則用五元散乃藜蘆赤小豆白礬皂角膽礬巴礬丸即巴豆枯白礬吐之烏藥順氣散烏藥順氣實中絡喎斜頑麻風注疼麻黃枳桔烏蠶共白芷乾薑陳草芎注實中絡謂風邪中絡之人形氣實者也喎斜口眼歪斜也頑麻肌膚麻木也風注疼風氣攻注骨節疼也是方麻黃枳殼桔梗烏藥殭蠶白芷陳皮乾薑甘草川芎也大秦艽湯大秦艽湯虛中絡喎斜偏廢減參珍秦艽生地石膏共羌獨防芷細辛芩注虛中絡謂風邪中絡之人形氣虛者也偏廢謂半身不遂也減參珍謂八珍湯減去人參加入秦艽生地石膏羌活獨活白芷防風細辛黃芩也偏廢是中經之證而亦可治之者以此方能養血榮筋為久病風人調理之劑換骨丹中經氣實宜換骨喎斜癱瘓芷芎防冰麝朱香槐苦味仙人麻首蔓蒼桑注中經氣實謂風邪中經之人形氣實也癱左不用也瘓右不用也換骨丹白芷川芎防風冰片麝香硃砂木香槐角苦參五味子葳靈仙人參麻黃膏何首烏蔓荊子蒼朮桑皮也麻黃膏者以麻黃熬成膏和煎藥為丸硃砂滾衣也小續命湯小續命湯虛經絡八風五痹總能全麻杏桂芍通營衛參草歸芎氣血宣風淫防風濕淫己黃芩熱淫附子寒春夏石膏知母入秋冬桂附倍加添注虛經絡謂風邪中經中絡之人形氣虛也八風謂八方之邪風中人為病也五痹詳見痹門要訣中黃耆五物湯黃耆五物虛經絡偏廢虛風無力癱心清語謇因舌軟舌強神濁是火痰補衛黃耆起不用益營芍桂棗姜煎左加當歸下牛膝筋瓜骨虎附經添注黃耆五物湯治因虛召風中人經絡而病半身不遂者然審其人若舌強難言神氣不清則是痰火為病不宜此方若心清語謇舌軟無力難言者乃是營衛不足之病宜用此方經曰衛虛則不用營虛則不仁此方君黃耆而補衛以起不用臣桂枝白芍而益營以治不仁佐生薑大棗以和營衛也不仁不用在右者屬氣宜倍加黃耆在左者屬血則加當歸在下兩腿兩膝軟者則加牛膝骨軟不能久立者則加虎骨筋軟難於屈伸者則加木瓜周身或左或右經絡不宣通者則加炮附子有寒者亦加之此方屢試屢效者其功力專於補外所以不用人參補內甘草補中也三化湯搜風順氣丸三化氣實風中腑昏冒閉滿小承羌形氣俱虛及風燥搜風順氣自然康注氣實風中腑謂風邪中腑之人形氣實也昏冒謂神昏不知人也閉滿謂二便阻隔腹滿脹也小承羌謂小承氣湯厚朴枳實大黃加羌活即三化湯也若其人形氣俱虛則當以搜風順氣丸緩緩治之自然康也久病風之人大便多結燥謂之風燥或用續命湯汗過三化湯下過津液枯乾以致結燥凡病不論中經絡臟腑但有二便阻隔形氣不足難堪攻下者均宜此法以搜六腑之風通腸胃中之氣二便自利矣牛黃清心丸牛黃清心實中藏痰壅神昏不語言口眼喎斜形氣盛兩手握固緊牙關注牛黃清心丸治風邪中臟之人形氣俱實其證痰涎壅塞神昏不能言語口眼喎斜形氣滿盛兩手握固牙關緊急之閉證皆可服之參附湯參附湯治虛中臟唇緩涎出不語言昏不知人身偏廢五脫證見倍參煎注參附湯即人參附子也治風邪中臟之人形氣俱虛其證唇緩不收痰涎流出神昏不語身肢偏廢或與五臟脫證並見宜大倍人參先固虛脫次治風邪可也千金還魂湯經絡閉證卒中惡氣促神昏不識人無汗拘急身偏痛肉桂麻草杏還魂注經絡閉證謂風邪中經絡之閉證也氣促謂氣粗盛也無汗四肢拘急身體偏痛乃表邪固閉宜用肉桂麻黃甘草杏仁即還魂湯以開之奪命散臟腑閉證腹滿閉昏噤痰結在喉間危急湯藥不能下奪命巴芷半葶南注臟腑閉證謂風邪中臟腑之閉證也腹滿閉謂腹滿二便閉也兼之神昏口噤不開結痰喉間不下宜用是方吐下之巴豆白芷半夏葶藶生南星也三生飲三生飲治中風寒厥逆沉伏湧氣痰星香烏附俱生用氣虛加參脫倍添注中風寒謂不論經絡臟腑風邪中臟寒之人也厥逆謂四肢冷也沉伏謂六脈沉伏也是方生南星生川烏生附子木香也惟寒盛氣實者宜之若氣虛者加人參虛極將脫者大倍人參始可用之而無倒戈之害也祛風至寶湯祛風至寶中風熱浮數面赤熱而煩通聖加蠍天麻細白附羌獨連柏蠶注中風熱謂不論經絡臟腑風邪中腑熱之人也浮數謂六脈浮數也熱而煩謂身熱心煩也通聖謂防風通聖散方中加全蠍天麻細辛白附羌活獨活黃柏黃連殭蠶也防風通聖散詳在傷寒門青州白丸子青州白丸中風痰喎斜癱瘓湧痰涎小兒驚痰為妙藥白附烏星半夏丸注中風痰謂不論經絡臟腑風邪中表有痰飲之人也湧痰涎謂痰涎湧盛也是方生白附子生川烏生南星生半夏法制為丸也羌活愈風湯羌活愈風治外中手足無力語出難肌肉微掣不仁用大秦艽湯參再添官桂黃耆杜防己知枳柴荷蔓菊前蒼麻半朴杞地骨調理諸風症可安注治外中謂風從外中之病也此病之來必有先兆如手足無力語言謇澀時有肌肉微動牽掣大指次指麻木不用皆風邪外中之先兆也宜用此湯大秦艽湯參再添謂大秦艽湯方中再添人參官桂黃耆杜仲防己知母枳殼柴胡薄荷蔓荊子菊花前胡蒼朮麻黃半夏厚朴枸杞地骨皮也調理諸風症可安謂凡中風內邪將除外邪漸盡更服此藥調理以行導諸經久則大風悉去清濁自分榮衛自和矣清熱化痰湯清熱化痰治內發神短忽忽語失常頭眩腳軟六君麥芩連菖枳竹星香注治內發謂痰火內發之病也此病之來必有先兆如神短忽忽言語失常上盛下虛頭眩腳軟皆痰火內發之先兆也宜用此湯即人參白朮茯苓甘草橘紅半夏麥冬黃芩黃連石菖蒲枳實竹茹南星木香也地黃飲子四肢不收無痛痱偏枯身偏不用疼其言不變志不亂邪在分腠五物能甚不能言為喑痱奪厥入臟病多凶地黃桂附蓉巴遠萸斛冬味薄菖苓注風痱偏枯喑痱三病皆屬外中而有微甚淺深之別也風痱謂四肢不收身無痛處偏枯謂半身不遂身有痛處其言不變志不亂乃邪微淺病在分腠榮衛之間以黃耆五物湯能補榮衛而散風邪也甚者不能言志亂神昏則為喑痱乃腎虛內奪少陰不至而厥其邪已入於臟故曰病多凶也地黃飲子是治腎虛內奪之方是方熟地肉桂附子肉蓯蓉巴戟遠志山萸石斛麥冬五味子薄荷石菖蒲茯苓也滌痰湯滌痰內發迷心竅舌強難言參蒲星溫膽熱盛芩連入神昏便閉滾痰攻注內發謂痰火內發迷人心竅令人精神恍惚舌強難言也滌痰湯即人參菖蒲南星合溫膽湯也溫膽湯橘紅半夏茯苓甘草竹茹枳實也熱盛加黃芩黃連大小二便閉用礞石滾痰丸攻之可也類中風總括類中類乎中風證尸厥中虛氣食寒火濕暑惡皆昏厥辨在喎斜偏廢間注類中風證皆名尸厥謂形厥而氣不厥也故口鼻無氣狀類死尸而脈自動也中虛中氣中食中寒中火中濕中暑中惡等證雖忽然昏倒人事不省類乎真中風病但不見口眼喎斜偏廢不仁不用等證自可辨也獨參湯參附湯星香湯三物備急丹奪命散尸厥無氣而脈動或脈微細有無間緣於病後氣血竭人參參附星香痰氣閉腹滿二便閉或腹急痛備急丹服後轉鳴吐下驗喉間痰結奪命先注尸厥之證有虛有實虛者以獨參湯虛兼寒者以參附湯虛兼痰者以星香飲加人參湯實者氣閉似死脈動有力腹滿脹二便閉或腹急痛氣閉前後不通者以備急丹實兼痰者以奪命散補中益氣湯生脈補精湯補中益氣療虛中煩勞過度氣不升虛冒有痰加苓半欲冒生麥地歸茸注補中益氣湯治虛中之證即李杲所云內傷氣虛之人煩勞過度清氣不升忽然昏冒也欲冒謂因房勞過度昏冒也生脈飲即人參麥冬五味子合熟地當歸鹿茸名曰生脈補精也木香調氣飲木香調氣實氣中暴怒氣逆噤昏痰風浮肢溫氣沉冷木藿砂蔻草丁檀注實氣中謂形氣俱實之人中氣也因暴怒氣逆忽然昏倒噤急也風浮肢溫氣沉冷謂中風之人脈浮手足溫中氣之人脈沉手足冷可別也是方木香藿香砂仁白蔻甘草丁香檀香也八味順氣散八味順氣虛氣中標本兼施邪正安參苓朮草扶元氣烏芷青陳利氣痰注虛氣中謂形氣俱虛之人中氣也宜用此標本兼施邪正相安之劑也瓜蒂散姜鹽湯食中過飽感寒風或因怒惱塞胸中忽然昏厥肢不舉瓜蒂姜鹽探吐平注瓜蒂散挾痰者用之薑湯挾寒者用之鹽湯過食者用之探吐謂作此湯數盅令病者飲一盅隨用指探吐不吐再飲再探以吐通快為度可立愈也附子理中湯附子理中療寒中腹痛拘急噤牙關有汗身寒或吐瀉附子參朮草姜干無汗身寒加麻細陰毒川烏用生煎嘔吐丁香吳萸入脈微欲絶倍參添注寒中之證即腹痛諸證者是也宜用附子理中湯若無汗加麻黃細辛陰毒加生川烏嘔吐加丁香吳茱萸脈微欲絶倍加人參陰毒寒極也詳在傷寒心法涼膈散涼膈火中神昏冒梔翹芩薄草硝黃兼治一切胸膈熱便燥譫妄與斑狂注火中之證即劉完素所云七情過極五志之火內發則令人昏倒無知筋骨不用也香薷飲藿香正氣散辰砂益元散尉臍法蒼朮白虎湯人參白虎湯暑中須分陰與陽陰邪無汗似寒傷壯熱心煩或嘔瀉香薷扁朴二香湯更兼昏憒蒸蒸汗面垢喘渴證為陽不省尉臍灌蒜水益元蒼參白虎湯注陰邪無汗似寒傷謂暑中陰邪似傷寒頭痛身痛惡寒無汗而更壯熱心煩或嘔或瀉也得之於受暑納涼寒外暑內宜香薷飲二香湯謂香薷飲合藿香正氣飲詳在霍亂門若有如上之證更兼精神昏憒蒸蒸自汗面垢喘渴則為暑中陽邪得之於赤日長途中外皆熱初中昏憒不省者急以熱物尉臍蒜汁合水灌之即省繼以辰砂益元散氣實者蒼朮白虎湯氣虛者人參白虎湯選而用之可也滲濕湯滲濕濕中內昏冒震亨濕熱熱生痰厚味醇酒生冷水胃苓香附撫砂連注濕中內謂濕從內生之病即朱震亨所云濕熱生痰昏冒之證得之於傷厚味醇酒生冷水物過節也滲濕湯即胃苓湯加香附撫芎砂仁黃連除濕湯除濕陰雨濕蒸霧臥濕涉水瘴山嵐頭身重痛便溏腫羌藁升柴防水煎注除濕湯即羌活藁本升麻柴胡防風蒼朮治濕因外中得之於天陰淫雨晴後濕蒸早晨霧露及久臥濕地遠行涉水瘴氣山嵐其證頭身重痛甚而昏冒大便溏瀉皮膚浮腫也調氣平胃散調氣平胃療惡中廟冢忤惡卒然昏面黑錯忘蘇合主次以木香平胃勻注蘇合主謂中惡之病以蘇合香丸為主也次以木香平胃勻謂以中氣木香調氣散之方合平胃散之藥調理也傷風總括傷風屬肺咳聲重鼻塞噴嚏涕流清鼻淵腦熱不噴嚏濁涕穢久必鼻紅注傷風屬肺故噴嚏也鼻淵屬腦故不噴嚏也傷風寒邪故涕清也鼻淵熱邪故涕濁也鼻淵病久或有穢氣則熱深故腦衄鼻血也川芎茶調散參蘇飲治虛傷風實者茶調及頭疼芎芷薄草羌茶細荊防痰半熱膏清注參蘇飲方在咳嗽門治氣虛之人傷風之病若氣實者用川芎茶調散即川芎白芷薄荷甘草羌活茶葉細辛荊芥防風傷風頭痛者亦可用也有痰者加半夏清痰有熱者加石膏清熱可也蒼耳散蒼耳散治鼻淵病風熱入腦瞑頭疼涕流不止鼻塞熱蒼耳辛夷芷薄蔥注鼻淵病屬風熱入腦故目瞑而頭疼涕流不止較之傷風為甚焉鼻塞氣不利也熱鼻孔中熱也甚者孔熱而痛及其腦也蒼耳散即蒼耳子炒去刺研破一兩加辛夷三錢白芷薄荷各一錢蔥三莖也黃連防風通聖散鼻淵初病施蒼耳黃連防風久病方孔痛膽調冰硼散鼻血犀角地黃湯注鼻淵風熱傷腦之病初病則風邪盛故用蒼耳散以散為主久病則熱鬱深故用防風通聖散加黃連以清為主也熱氣湧涕傷其鼻孔成瘡故痛也宜以豬膽汁調冰硼散敷之熱蘊於腦傷及所過營血故衄也宜以犀角地黃湯涼之可也痙病總括痙病項強背反張有汗為柔無汗剛生産血多過汗後潰瘡犬咬破風傷注痙病之證詳在傷寒心法有汗為柔痙無汗為剛痙産後去血過多傷寒發汗過多則為內因潰瘍破傷狗咬則為外因皆風邪乘虛入太陽經而成此病也痙病死證痙證脈散多應死反張離席一掌亡眼小目瞪昏不語額汗如珠命必傷注反張離席一掌謂離席四五指許也眼小謂目睫緊小也目瞪謂眼珠不轉也葛根湯桂枝加葛根湯小續命湯桂枝加附子湯當歸補血湯大承氣湯桃仁承氣湯剛痙葛根湯發汗柔痙桂枝加葛良若兼雜因小續命過汗桂枝加附湯傷血桂枝合補血裡實瘀血承氣方潰瘍十全加風藥破傷狗咬另參詳注剛痙用葛根湯即桂枝湯加麻黃葛根柔痙用桂枝加葛根湯即桂枝湯加葛根汗之雜因謂風寒濕雜揉為病用小續命湯隨風寒濕輕重治之過汗表虛汗出不止因而成痙用桂枝加附子湯即桂枝湯加附子也傷血謂産後金瘡大傷血後用桂枝湯合補血湯即當歸黃耆也裡實謂痙病腹滿二便閉以大承氣湯及産後惡露不盡少腹硬急以桃仁承氣湯下之潰瘍去膿血過多為風所襲者用十全大補湯加祛風之藥治之破傷風破傷亡血筋失養微傷風入火之端燥起白痂瘡不腫濕流汙水緊牙關注破傷去血過多筋失所養經絡空虛風邪乘之為病即經曰風邪乘虛而入也為風虛邪宜桂枝湯合當歸補血湯治之夫傷重出血過多而病風者常也然時有微傷淺損去血甚少風邪乘之而病者以其人素熱因風而然即劉完素曰熱甚風搏並於經絡也為風火邪宜防風通聖散加蠍尾治之凡此證不論虛實風毒內蘊不發於外瘡口周圍燥起白痂瘡不甚腫濕流汙黑之水牙關微緊不似尋常活動皆破傷風之先兆也防風通聖散加蠍尾方全蠍散左龍丸斑蝥大黃方火盛通聖加蠍尾風盛全蠍左龍丸外因燒酒火罐法犬風斑大酒同煎注破傷火盛者多陽明證用防風通聖散加蠍尾治之風盛者多太陽證用全蠍散即生蠍尾七枚研末熱酒服之服後不解漸深入里用左龍丸即野鴿糞江鰾殭蠶雄黃蜈蚣天麻硃砂巴豆霜為丸也方詳在丹溪心法諸破傷風門內皆宜外用砂燒酒壺兩個盛多半壺燒酒先以一壺上火令滾無聲傾酒即按在破傷瘡口拔出汙黑血水滿則自落再以次壺仍按瘡口輪流提拔以盡為度其風立愈犬咬風毒入腹成痙風者用斑蝥七枚以糯米拌炒米黃去米為末生大黃末一錢合均黃酒一盞煎至半盞空心溫服取下毒物弱者減半服之可也痹病總括三痹之因風寒濕五痹筋骨脈肌皮風勝行痹寒痹痛濕勝著痹重難支皮麻肌木脈色變筋攣骨重遇邪時復感於邪入臟腑周同脈痹不相移注三痹之因風寒濕三氣雜合而為病也其風邪勝者其痛流走故曰行痹寒邪勝者其痛甚苦故曰痛痹濕邪勝者其痛重著故曰著痹此為病之因而得名曰三痹也又有曰五痹者謂皮脈肌筋骨之痹也以秋時遇此邪為皮痹則皮雖麻尚微覺痛癢也以夏時遇此邪為脈痹則脈中血不流行而色變也以長夏時遇此邪為肌痹則肌頑木不知痛癢也以春時遇此邪為筋痹則筋攣節痛屈而不伸也以冬時遇此邪為骨痹則骨重痠疼不能舉也曰入臟腑者謂內舍五臟之痹也以皮痹不已復感於邪內舍於肺成肺痹也脈痹不已復感於邪內舍於心成心痹也肌痹不已復感於邪內舍於脾成脾痹也筋痹不已復感於邪內舍於肝成肝痹也骨痹不已復感於邪內舍於腎成腎痹也此皆以病遇邪之時及受病之處而得名曰五痹也所謂邪者重感於風寒濕之氣也周痹亦在血脈之中隨脈上下為病故同脈痹但患有定處不似脈痹左右相移也近世曰痛風曰流火曰歷節風皆行痹之俗名也周痹周痹患定無歇止左右不移上下行似風偏廢只足手口眼無斜有痛疼注周痹或痛或腫或手或足患有定處痛無歇止或從上病及於下或從下病及於上而不似衆痹痛有歇止左右相移流走也周痹或兩手或兩足或隻手足或偏廢不仁不用而似中風但不口眼喎斜身有痛疼也痹病生死證痹在筋骨痛難已留連皮脈易為功痹久入臟中虛死臟實不受復還生注痹在筋骨則受邪深故痛久難已痹在皮脈則受邪淺故易治也凡痹病日久內傳所合之臟則為五臟之痹若其人中虛受邪則難治多死其人臟實而不受邪復還於外則易治多生假如久病皮痹復感於邪當內傳肺而為肺痹若無胸滿而煩喘咳之證則是臟實不受邪餘臟仿此痹入臟腑證肺痹煩滿喘咳嗽腎脹尻踵脊代頭脾嘔痞硬肢懈墮心煩悸噫恐時休數飲臥驚肝太息飲祕脹瀉在腸究胞祕沃痛鼻清涕三焦胃附膽無憂注久病皮痹復感於邪見胸滿而煩喘咳之證是邪內傳於肺則為肺痹也久病骨痹復感於邪而見腹脹尻以代踵足攣不伸脊以代頭傴僂不直之證是邪內傳於腎則為腎痹也久病肌痹復感於邪而見嘔涎心下痞硬四肢懈墮之證是邪內傳於脾則為脾痹也久病脈痹復感於邪而見心煩心悸嗌乾噫氣有時則恐之證是邪內傳於心則為心痹也久病筋痹復感於邪而見喜飲小便數多夜臥則驚太息之證是邪內傳於肝則為肝痹也久痹不已復感於邪臟實不受而傳腑者凡見喜飲小便祕不脹則瀉不瀉則脹之證是邪內傳於大小腸則為腸痹也凡見少腹胞中按如沃湯狀而痛小便祕澀鼻流清涕之證是邪內傳於膀胱則為胞痹也三焦之痹附於膀胱從水道也胃痹附於大小二腸從傳化也膽為清淨之府不受痹邪故曰無憂也小續命湯增味五痹湯痹虛加減小續命痹實增味五痹湯麻桂紅花芷葛附虎羊耆草二防羌注痹虛謂氣虛之人病諸痹也宜用加減小續命湯風勝行痹倍防風寒勝痛痹倍附子濕勝著痹倍防己皮痹加黃耆或桂枝皮脈痹加薑黃或加紅花肌痹加葛根或加白芷筋痹加羚羊角或加續斷骨痹加虎骨或加狗脊有汗減麻黃便溏減防己寒勝減黃芩加乾薑熱勝減附子加石膏加減治之痹實謂氣血實之人病諸痹也宜用增味五痹湯即麻黃桂枝紅花白芷葛根附子虎骨羚羊角黃耆甘草防風防己羌活也行痹以羌活防風為主痛痹以麻黃附子為主著痹以防己羌活為主皮痹以黃耆桂枝皮為主脈痹以紅花桂枝為主肌痹以葛根白芷為主筋痹以羚羊角為主骨痹以虎骨為主增味於五痹治之可也木通湯附子五苓散蒼朮五苓散三痹木通長流水濕加防己風羌防寒痹附麻分汗入胞腸五苓附子蒼注三痹謂行痹痛痹著痹也宜用木通一味不見水者二兩以長流水二碗煎一碗熱服取微汗不愈再服以愈為度若其痛上下左右流走相移者加羌活防風以祛風邪其痛苦甚者有汗加附子無汗加麻黃以去寒邪其痛重著難移者加防己以勝濕邪其所應加之藥不可過三錢弱者俱減半服胞痹宜用五苓散加附子腸痹宜五苓散加蒼朮以利寒飲也五苓散方在傷寒門三痹湯獨活寄生湯三痹十全無白朮牛秦續杜細獨防獨活加桑除耆續入臟乘虛久痹方注三痹謂三痹湯即十全大補湯無白朮加牛膝秦艽續斷杜仲細辛獨活防風也獨活謂獨活寄生湯依三痹湯方加桑寄生除去黃耆續斷也此皆治五痹不已乘虛入臟反留連日久調理痹病之方也黃耆益氣湯黃耆益氣虛皮痹皮麻不知癢與疼補中益氣加紅柏味秋芩夏桂加冬注氣實麻木用小續命湯加麻黃治之氣虛麻木用黃耆益氣湯即補中益氣湯加紅花黃柏也秋加五味子夏加黃芩冬加桂枝皮蠲痹湯加味升陽散火湯蠲痹冷痹身寒厥附歸耆草桂羌防肌熱如火名熱痹羚犀升陽散火湯注蠲痹湯即附子當歸黃耆炙草官桂羌活防風治痹病而身寒無熱四肢厥冷名曰冷痹也加味升陽散火湯即內傷門升陽散火湯加羚羊角犀角治痹病而肌熱如火名曰熱痹也痿病總括五痿皆因肺熱生陽明無病不能成肺熱葉焦皮毛瘁發為痿躄不能行心熱脈痿脛節縱腎骨腰脊不能興肝筋拘攣失所養脾肉不仁燥渴頻注五痿心肝脾肺腎之痿也痿屬燥病故皆因肺熱而生也陽明者五臟六腑之海主潤宗筋陽明無病則宗筋潤能束骨而利機關雖有肺熱不能成痿也肺熱葉焦陽明虛弱津液不化筋骨失養皮毛瘁痿發為痿躄不能行也因而心氣熱為脈痿則脛節縱而不任地肺兼心病也因而腎氣熱為骨痿則腰脊不能興舉肺兼腎病也因而肝氣熱為筋痿則筋失所養拘攣不伸肺兼肝病也因而脾氣熱為肉痿則胃燥而渴肌肉不仁肺兼脾病也痿痹辨似痿病足兮痹病身仍在不疼痛里分但觀治痿無風藥始曉虛實別有因注痿痹之證今人多為一病以其相類也然痿病兩足痿軟不痛痹病通身肢節疼痛但觀古人治痿皆不用風藥則可知痿多虛痹多實而所因有別也痿病治法痿燥因何治濕熱遵經獨取治陽明陽明無故惟病肺胃壯能食審證攻控涎小胃濕痰熱陽明積熱法三承胃弱食少先養胃久虛按證始收功注痿屬燥病因何而用治濕熱苦燥之藥蓋遵內經之治法獨取於陽明胃也故胃家無病雖有肺熱惟病肺而不病痿也是知病痿者胃家必有故也或濕熱或積熱或濕痰不論新久若胃壯能食當先審證攻之胃有濕痰用控涎丹攻之有濕熱者用小胃丹攻之有積熱者用三承氣湯攻之此治胃壯能食之法也若胃弱飲食減少氣血津液不足當先以補養脾胃為主其有久病留連諸虛燥熱或攻下之後調理當審證治之始收全功也加味二妙湯加味二妙濕熱痿兩足痿軟熱難當防己當歸川萆薢黃柏龜版膝秦蒼注熱難當謂兩足熱難當也膝秦蒼謂牛膝秦艽蒼朮也清燥湯虎潛丸十全大補湯加味金剛丸時令濕熱清燥效陰虛濕熱虎潛靈久虛痿軟全金主萆瓜牛菟杜蓯蓉注清燥湯在內傷門虎潛丸有成方全金主謂十全大補湯加味金剛丸久病氣血虛以十全大補湯為主筋骨痿軟以加味金剛丸為主加味金剛丸即萆薢木瓜牛膝菟絲子杜仲肉蓯蓉也腳氣總括腳氣風寒濕熱病往來寒熱狀傷寒腿腳痛腫熱為火不腫不熱是寒干注腳氣乃內有濕熱外感風寒相合為病故往來寒熱狀類傷寒兩腳腿痛腫熱如火者是火盛也不腫不熱而痛者是寒盛也名曰乾腳氣腳氣死證腳氣脈急少腹頑不三五日入心間嘔吐喘滿目額黑恍惚譫妄命難全注腳氣脈急少腹頑木不知痛癢不過三五日內其邪必入心間若入心間嘔吐喘滿是為腳氣衝心之證目額皆黑恍惚譫妄則是水來剋火之徵故曰命難全也攢風散羌活導滯湯勝濕餅子五積散獨活寄生湯腳氣表解攢風散麻桂杏草萆烏良里解導滯羌獨活防己當歸枳大黃濕盛重腫勝濕餅二醜蕎麵遂成方寒濕五積加附子寒虛獨活寄生湯注初病腳氣表實無汗用攢風散汗之即麻黃桂枝杏仁甘草萆薢炮川烏也裡實熱盛二便不利用羌活導滯湯下之即羌活獨活防己當歸枳實大黃也濕盛重腫用勝濕餅子即黑醜白醜頭末甘遂末各五錢蕎麥麵一兩五錢水和作餅三錢煮熟空心茶清服逐之寒濕者用五積散加附子治之方在傷寒門寒虛者用獨活寄生湯補之方在痹門當歸拈痛湯當歸拈痛虛濕熱茵陳四苓與羌防人參當歸升芩草苦參知母葛根蒼注濕熱腳氣而形氣虛者宜用當歸拈痛湯即茵陳白朮茯苓豬苓澤瀉羌活防己人參當歸升麻黃芩甘草苦參知母葛根蒼朮也加味蒼柏散加味蒼柏實濕熱二活二術生地黃知柏芍歸牛膝草木通防己木瓜榔注濕熱腳氣而形質實者宜用加味蒼柏散即羌活獨活蒼朮白朮生地黃知母黃柏赤芍當歸牛膝甘草木通防己木瓜檳榔也大防風湯兩膝腫大而疼痛髀脛枯細鶴膝風大防風附羌牛杜十全大補減茯苓注兩膝腫大疼痛膝上至髀膝下脛足枯細但存皮骨兩膝狀若鶴膝故名鶴膝風也宜大防風湯即防風附子羌活牛膝杜仲人參白朮炙草當歸川芎白芍熟地炙耆肉桂也此病若得之於痢疾病後者名曰痢風亦用此方
