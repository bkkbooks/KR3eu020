body:
  text: 卷三神之名義形之精粹處名心中含良性本天真天真一氣精神祖體是精兮用是神注動植之物一有其形則形之至精至粹之處即名曰心動物之心者形若垂蓮中含天之所賦虛靈不昧之靈性也植物之心者即中心之芽中含天之所賦生生不已之生意也此形若無此心則形無主宰而良性生意亦無著落矣此心若無良性生意則心無所施用不過是一團死肉一枯草木之芽耳蓋人雖動物之貴而其中含良性與一切動物皆同本乎天真也天真之氣分而言之為精氣神故曰以精為體以神為用也合而言之渾然一氣故曰天真一氣精神之祖也神之變化神從精氣妙合有隨神往來魂陽靈並精出入陰靈魄意是心機動未形意之所專謂之志志之動變乃思名以思謀遠是為慮用慮處物智因生注魂陽之靈隨神往來魄陰之靈並精出入蓋神機不離乎精氣亦不雜乎精氣故曰妙合而有也故指神而言則神超乎精氣之外指精氣而言則神寓乎精氣之中意者心神之機動而未形之謂也志者意所專注也思者志之變動也慮者以思謀遠之謂也智者以慮處物之謂也此皆識神變化之用也五臟神情心藏神兮脾意智肺魄肝魂腎志精氣和志達生喜笑氣暴志憤恚怒生憂思繫心不解散悲哭哀苦悽然情內生懼恐求人伴外觸駭然響動驚注五臟所藏七神心藏神脾藏意與智肺藏魄肝藏魂腎藏精與志也五臟所生七情心生喜肝生怒脾生憂思肺生悲腎生恐也氣和則志達故生喜笑氣暴則志憤故生恚怒繫心不解散故生憂思淒心則哀苦故生悲哭內恐外觸非常事物故生恐懼驚駭也神病治法硃砂安神丸內生不恐心跳悸悸更驚惕是怔忡善忘前言曰健忘如昏似慧恍惚名失志傷神心膽弱痰飲九氣火相乘清熱朱連歸地草余病他門治法精注驚悸怔忡健忘恍惚失志傷神等病皆因心虛膽弱諸邪得以乘之也心氣熱者先用硃砂安神丸以清之其餘虛實諸邪則當與虛損九氣癲癇痰飲等門合證揀方自有效法之處仁熟散恐畏不能獨自臥膽虛氣怯用仁熟柏仁地枸味萸桂參神菊殼酒調服注恐畏不能獨自臥者皆因氣怯膽虛也仁熟散即柏子仁熟地黃枸杞子五味子山茱萸桂心人參茯神菊花枳殼為末老酒調服也癲癇總括經言癲狂本一病狂乃陽邪癲是陰癲疾始發意不樂甚則神癡語不倫狂怒凶狂多不臥目直罵詈不識親癇發吐涎昏噤倒抽搐省後若平人注李時珍曰經有言癲狂疾者又言癲疾為狂者是癲狂為兼病也邪入於陽者狂邪入於陰者癲蓋癲疾始發志意不樂甚則精神呆癡言語不倫而睡如平時以邪並於陰也狂疾始發多怒不臥甚則凶狂欲殺目直罵詈不識親疏而夜多不臥以邪並於陽也然俱不似癇疾發則吐涎神昏卒倒無知口噤牙緊抽搐時之多少不等而省後起居飲食皆若平人為別也癇雖分而為五曰雞馬牛羊豬名者以病狀偶類故也其實痰火氣驚四者而已所以為治同乎癲狂也三聖散青州白丸子滾痰丸遂心丹礬郁丸控涎丹抱膽丸鎮心丹癲狂癇疾三聖吐風痰白丸熱滾痰痰實遂心氣礬郁痰驚須用控涎丹無痰抱膽鎮心治發灸百會自然安初發皂角灌鼻內涎多欲止點湯鹽注癲狂癇疾初起多痰者先以三聖散吐之風盛有痰者用青州白丸子熱盛有痰者用礞石滾痰丸痰而形氣實者用遂心散甘遂硃砂豬心也痰而兼氣鬱者用礬郁丸白礬鬱金也痰而兼驚者用控涎丹無痰神輕因而驚悸者用鎮心丹抱膽丸皆成方也癇病發時灸百會不抱壯數以蘇為止再發再灸以愈為度初發用皂角汁灌鼻內其風涎即從鼻口中涕唾而出若蘇後其涎不止以鹽湯服之自止諸氣總括寒氣炅氣喜氣怒氣勞氣思氣悲氣恐氣驚氣一氣觸為九寒炅喜怒勞思悲恐驚寒收外束腠理閉炅泄內蒸腠理通喜則氣緩虛極散勞耗思結氣難行怒氣逆上甚嘔血下乘脾虛飧瀉成恐則氣下傷精志驚心無倚亂怔忡悲消榮衛不散布壯行弱著病叢生注一氣流行不為邪觸何病之有若為寒觸外束皮膚腠理閉其氣收矣即寒病也炅火也若為火觸熱蒸汗出腠理開其氣泄矣即暑病也若為喜觸喜則氣和志達其氣緩矣素中虛極者緩則氣散即暴脫也若為勞觸勞則喘息且汗出其氣耗矣即勞倦也若為思觸心有所存氣留不行其氣結矣即鬱氣也若為怒觸怒則氣逆甚嘔血其氣上矣上極而下乘脾之虛則為飧泄也若為恐觸恐則精卻傷精志其氣下矣若為驚觸心無所依神無所歸慮無所定其氣亂矣怔忡心動不安之病也若為悲觸心肺氣戚榮衛不散其氣消矣凡此九氣叢生之病壯者得之氣行而愈弱者得之氣著為病也諸氣辨證短氣氣短不能續少氣氣少不足言氣痛走注內外痛氣鬱失志怫情間上氣氣逆蘇子降下氣氣陷補中宣臭甚傷食腸胃郁減食消導自然安注短氣者氣短而不能續息也少氣者氣少而不能稱形也皆為不足之證氣痛者氣為邪阻氣道不通或在經絡或在臟腑攻衝走注疼痛也上氣乃濁氣上逆下氣為清氣下陷氣鬱者或得於名利失志或得於公私怫情二者之間也濁氣上逆蘇子降氣湯清氣下陷補中益氣湯甚者加訶子五味子然清氣下陷下氣不甚臭穢惟傷食下氣其臭甚穢乃腸胃鬱結穀氣內發而不宣通於腸胃之外郁在胃者上噫氣也郁在腸者下矢氣也補中益氣湯方見內傷門諸氣治法寒熱熱寒結者散上抑下舉驚者平喜以恐勝悲以喜勞溫短少補皆同注寒者熱之麻黃理中是也熱者寒之白虎生脈是也結者散之越鞠解鬱是也上者抑之蘇子降氣是也下者舉之補中益氣是也驚者平之鎮心妙香是也喜以恐勝悲以喜勝以情治情是也勞者溫之短氣少氣者補之保元四君是也木香流氣飲木香流氣調諸氣快利三焦榮衛行達表通里開胸膈腫脹喘嗽氣為疼六君丁皮沉木桂白芷香附果蘇青大黃枳朴檳蓬朮麥冬大腹木瓜通注木香流氣飲調治一切諸氣為病其功能快利三焦通行榮衛外達表氣內通里氣中開胸膈之氣其水腫脹滿氣壅喘嗽氣痛走注內外疼痛並皆治之即人參白朮茯苓炙草橘皮半夏丁皮沉香木香中桂白芷香附草果蘇葉青皮大黃枳殼厚朴檳榔蓬朮麥冬大腹皮木瓜木通也分心氣飲分心氣飲治七情氣滯胸腹不流行正減芷朴通木附麥桂青桑檳殼蓬注分心氣飲治七情氣滯胸腹之病正者謂藿香正氣散也正減者謂即藿香正氣散方減白芷厚朴加木通木香香附麥冬官桂青皮桑皮檳榔枳殼蓬朮也蘇子降氣湯越鞠湯蘇子降氣氣上攻下虛上盛氣痰壅喘咳涎嗽胸膈滿氣祕氣逆嘔鮮紅橘半肉桂南蘇子前朴沉歸甘草同郁食氣血痰濕熱越鞠蒼梔曲附芎注蘇子降氣湯治下虛上盛氣壅上攻喘咳涎嗽胸膈滿悶氣祕便難氣逆嘔血即橘皮半夏肉桂南蘇子前胡厚朴沉香當歸甘草也越鞠湯治六郁食鬱氣鬱血鬱痰鬱濕鬱熱鬱即蒼朮山梔神麯香附撫芎也夫氣鬱之病若久必與血痰濕熱飲食相合故治郁之方可治氣鬱也其氣實者加木香氣虛者加人參血實者加紅花血虛者加當歸痰多者加半夏濕多者加白朮熱多者加萸連飲多者加茯苓食多者加麥糵在臨證者消息耳四七湯四七七氣鬱生痰梅核吐咯結喉間調和諸氣平和劑半苓厚朴紫蘇煎快氣橘草香附入婦人氣病效如仙惡阻更加芎歸芍氣痰濁帶送白丸注四七湯治七情過節七氣病生鬱結生痰如絮如膜凝結喉間咯之不盡咽之不下名曰梅核氣日久不愈變生噎膈上吐涎沫下祕二便也宜用此平和之劑即半夏茯苓厚朴紫蘇葉也胸腹中氣不快加橘皮甘草香附亦治婦人一切氣病婦人有孕喜吐者名曰惡阻更加川芎當歸白芍婦人肥白多痰氣鬱有白濁帶下者亦以本方送青州白丸子可也鎮心丹妙香散驚實鎮心朱齒血驚虛妙香木麝香山藥茯神參耆草硃砂桔梗遠苓菖注心氣實病驚者宜用鎮心丹即硃砂龍齒末等分豬心血為芡實大丸每服三丸麥冬湯下心氣虛病驚者宜用妙香散加菖蒲即木香麝香山藥茯神人參黃耆炙草硃砂桔梗遠志茯苓石菖蒲也遺精總括不夢而遺心腎弱夢而後遺火之強過欲精滑清氣陷久曠溢瀉味醇傷注不夢而遺謂無所感於心而自遺則為心腎虛弱不固也夢而後遺謂有所感於心相火煽而強迫之則為二火之強不固也或過欲之人日慣精滑或清氣不足下陷不固或久曠之人精盛溢瀉或醇酒厚味火強不固皆為是病也龍骨遠志丸坎離既濟湯封髓丹心腎虛弱朱遠志龍骨神苓菖蒲參久曠火旺地知柏胃虛柏草縮砂仁注龍骨遠志丸治心腎虛弱不夢而遺者即龍骨硃砂遠志茯神茯苓石菖蒲人參也坎離既濟湯治夢而後遺火強久曠者即生地黃柏知母也若胃虛食少便軟則不宜生地知柏恐苦寒傷胃故宜封髓丹即黃柏甘草縮砂仁也補精丸精出不止陽不痿強中過補過淫成久出血痛形羸死或發消渴或發癰陽盛坎離加龍骨實熱解毒大黃攻調補骨脂韭山藥磁石蓯蓉參鹿茸注精出不止陽強不倒名曰強中此病皆因過服房術中補藥或貪淫過欲而成也若不急治日久精盡陽強不化迫血而出疼痛不已形羸而死或不即死亦必發消渴大癰也陽盛陰虛者宜大劑坎離既濟湯加生龍骨清而補之形實熱盛者宜黃連解毒湯加大黃先攻其熱可也病後熱去調理宜補精丸即補骨脂韭子山藥磁石肉蓯蓉人參鹿茸也濁帶總括濁病精竅尿自清穢物如膿陰內疼赤熱精竭不及化白寒濕熱敗精成注赤多屬熱亦有濁帶日久精竭陽虛不及化白而屬寒者白多屬寒亦有敗精濕熱釀成腐化變白而屬熱者是則不可概以寒熱論赤白也清心蓮子飲萆薢分清飲珍珠粉丸濁熱清心蓮子飲寒萆菖烏益草苓濕熱珍珠炒姜柏滑黛神麯椿蛤同注赤濁帶下屬熱者宜用清心蓮子飲方在淋門白濁帶下屬寒者宜用萆薢分清飲即萆薢菖蒲烏藥益智甘草茯苓也赤白濁帶下屬濕熱者宜用珍珠粉丸即炒黑薑炒黃柏滑石青黛炒神麯炒椿皮蛤粉也黑錫丹黑錫上盛下虛冷精竭陽虛火上攻上壅頭痛痰氣逆下漏濁帶白淫精骨脂茴香葫蘆巴肉蔻桂附木金櫻沉香陽起巴戟肉硫鉛法結要研明注赤白濁帶下屬虛寒者及虛陽上攻頭痛喘嗽痰壅氣逆俱宜黑錫丹即補骨脂小茴香葫蘆巴肉蔻附子肉桂木香金櫻子沉香陽起石巴戟硫黃黑鉛也痰飲總括陰盛為飲陽盛痰稠濁是熱沫清寒燥少黏連咯不易濕多易出風掉眩膈滿嘔吐為伏飲支飲喘咳腫臥難飲流四肢身痛溢嗽引脅痛謂之懸痰飲素盛今暴瘦漉漉聲水走腸間飲留肺胸喘短渴在心下悸背心寒注飲則清稀故為陰盛痰則稠濁故為陽盛稠濁是熱痰屬心也沫清是寒痰屬腎也少而黏連咯不易出是燥痰屬肺也多而易出是濕痰屬脾也搐搦眩暈是風痰屬肝也膈上痰滿嘔吐痰涎此飲留於膈間名曰伏飲也喘咳面腫不得臥此飲留於肺名曰支飲也飲流四肢身體重痛此飲留行於體名曰溢飲也咳嗽引脅疼痛此飲留於脅下名曰懸飲也素盛今瘦漉漉有聲水走腸間此飲留於腸胃名曰痰飲也凡飲留於胸肺則喘滿短氣而渴飲留於膈下則心下悸或背心寒冷也二陳湯燥痰湯諸痰橘半茯苓草惟有燥者不相當風加南星白附子熱加芩連寒桂姜氣合四七郁香附虛入參朮濕入蒼燥芩旋海天冬橘風消枳桔貝蔞霜注諸痰謂一切痰皆宜二陳湯治之即橘紅半夏茯苓甘草也因有苓半性過滲燥故與燥痰不相當也依本方風痰加南星白附子熱痰加黃芩黃連寒痰加乾薑肉桂氣痰加厚朴蘇葉即是合四七湯也因郁生痰加香附氣虛有痰加人參白朮即六君子湯也濕痰加蒼朮燥痰宜用燥痰湯即枯黃芩旋覆花海石天冬橘紅風化芒硝枳殼桔梗貝母栝蔞霜也茯苓指迷丸茯苓風消枳殼半痰飲平劑指迷丸寒實瓜蒂透羅治熱實大陷小胃丹注指迷丸治一切痰飲平和之劑即茯苓風化芒硝枳殼半夏也痰飲寒實者用瓜蒂散吐之或用透羅丹下之熱實者在膈上用大陷胸湯丸在三焦用小胃丹攻之半夏茯苓湯加丁香湯越婢加朮湯流飲控涎苓桂治伏飲神佑半苓丁支飲葶藶懸十棗溢飲越術小青龍注留飲者謂一切飲留於上下內外也實者用控涎丹攻之虛者用苓桂朮甘湯溫之伏飲實者用神佑丸虛者用半夏三錢茯苓二錢丁香一錢生薑三錢煎服治之即半夏茯苓湯加丁香也支飲用葶藶大棗湯懸飲用十棗湯治之溢飲有熱者用越婢加朮湯即麻黃石膏甘草生薑大棗加蒼朮也有寒者用小青龍湯治之咳嗽總括有聲曰咳有痰嗽聲痰俱有咳嗽名雖云臟腑皆咳嗽要在聚胃關肺中胃濁脾濕嗽痰本肺失清肅咳因生風寒火鬱燥痰飲積熱虛寒久勞成注有聲無痰曰咳有痰無聲曰嗽有聲有痰曰咳嗽內經雖云五臟六腑皆令人咳而大要皆在聚於胃關於肺也因胃濁則所遊溢之精氣與脾濕所歸肺之津液皆不能清水精之濁難於四布此生痰之本為嗽之原也肺居胸中主氣清肅或為風寒外感或為痰熱內干清肅有失降下之令因氣上逆而咳嗽也久勞成謂久病咳嗽不已傷肺成勞也參蘇飲芎蘇飲香蘇飲茯苓補心湯參蘇感冒邪傷肺熱寒咳嗽嚏痰涎氣虛用參實減去二陳枳桔葛蘇前頭痛加芎喘加杏芩因熱入麻干寒虛勞胎産有是證補心四物量抽添注參蘇飲治感冒風寒傷肺咳嗽嚏唾痰涎發熱惡寒也即人參蘇葉橘紅半夏茯苓甘草枳殼桔梗前胡葛根也形氣虛者必用人參若形氣實減去可也若頭痛依本方去人參以前胡易柴胡加川芎名芎蘇飲若喘嗽依本方去人參加杏仁名杏蘇飲若內有熱加黃芩有寒加麻黃乾薑若虛勞之人及胎前産後而有是病依本方合四物湯名茯苓補心湯量其虛實寒熱加減可也瀉心散葶藶瀉白散瀉白肺火鬱氣分喘咳面腫熱無痰桑骨甘草寒麻杏血分加芩熱甚連咳急嘔逆青橘半郁甚失音訶桔添停飲喘嗽不得臥加苦葶藶效通仙注瀉白散即桑皮地骨皮甘草也治喘嗽面腫無痰身熱是為肺經火鬱氣分若無汗是為外寒鬱遏肺火加麻黃杏仁以發之若無外證惟面赤是為肺經火鬱血分加黃芩內熱甚者更加黃連以清之咳急嘔逆者加青皮橘紅半夏以降之火鬱甚而失音者加訶子肉桔梗以開之若喘嗽面浮不得臥者是為兼有停飲加苦葶藶以瀉之名葶藶瀉白散清肺湯清肺肺燥熱咳嗽二冬母草橘芩桑痰加蔞半喘加杏快氣枳桔斂味良注清肺湯即麥冬天冬知母貝母甘草橘紅黃芩桑皮也有痰燥而難出加栝蔞子痰多加半夏喘加杏仁胸膈氣不快加枳殼桔梗久則宜斂加五味子清燥救肺湯喻氏清燥救肺湯肺氣虛燥郁咳方參草麥膏生氣液杏枇降逆效功長胡麻桑葉阿潤燥血枯須加生地黃熱甚牛黃羚犀角痰多貝母與蔞霜注喻氏喻嘉言也枇枇杷葉也羚犀羚羊角犀角也蔞霜栝蔞霜也透羅丹瀉肺丸寒實痰清透羅丹咳時涎壅氣出難巴杏大牽皂半餅熱實痰稠瀉肺丸注寒實痰盛涎清熱實痰盛稠黏皆能令人咳嗽嗽時痰涎頓壅氣閉難出寒實者用透羅丹即巴豆杏仁大黃牽牛皂角半夏共為末蒸餅為小丸量服方出丹溪心法附余熱實者宜瀉肺丸方見失血門人參瀉肺湯積熱傷肺宜瀉肺喘嗽痰多黏色黃胸膈滿熱大便澀涼膈枳桔杏參桑注人參瀉肺湯即涼膈散梔子連翹薄荷黃芩大黃甘草枳殼桔梗杏仁人參桑皮也鍾乳補肺湯補肺虛寒喘嗽血皮毛焦枯有多年生脈菀款桑皮桂鍾英糯米棗姜煎注補肺湯即人參麥冬五味子款冬花紫菀桑皮桂枝鐘乳石白石英糯米大棗生薑也人參養肺湯養肺平劑肺氣虛勞久喘嗽血腥宜參草杏阿知母棗烏梅罌粟骨桑皮注人參養肺湯為治肺氣虛損久勞不寒不熱之平劑也其方即人參炙草杏仁阿膠知母大棗烏梅罌粟殼地骨皮桑皮也清寧膏太平丸咳嗽痰血清寧治甘桔麥地橘龍圓薏米川貝薄荷末血過於痰太平丸注咳嗽痰少血多用太平丸方諸書俱有瓊玉膏杏酥膏瓊玉膏治肺虛勞肺痿干嗽咳涎滔生地膏蜜參苓末不虛燥蜜杏酥膏注瓊玉膏治虛燥先以生地煎膏後入煉白蜜人參茯苓末攪成膏杏酥膏治不虛而燥以杏仁霜奶酥油煉白蜜溶化合膏喘吼總括喘則呼吸氣急促哮則喉中有響聲實熱氣粗胸滿硬虛寒氣乏飲痰清注呼吸氣出急促者謂之喘急若更喉中有聲響者謂之哮吼氣粗胸滿不能布息而喘者實邪也而更痰稠便硬者熱邪也氣乏息微不能續息而喘者虛邪也若更痰飲清冷寒邪也喘急死證喘汗潤髮為肺絶脈澀肢寒命不昌喘咳吐血不得臥形衰脈大氣多亡注氣多謂出氣多入氣少也華蓋湯千金定喘湯葶藶大棗湯外寒喘吼華蓋湯麻杏蘇草橘苓桑減苓加芩款半果飲喘難臥棗葶方注外寒傷肺喘急用華蓋散即麻黃杏仁蘇子甘草橘紅赤茯苓桑皮也依本方減茯苓加黃芩款冬花半夏白果名千金定喘湯治哮吼表寒之喘葶藶大棗湯治停飲不得臥之喘也蘿皂丸蘇子降氣湯火鬱喘急瀉白散痰盛作喘蘿皂丸蔞仁海石星蘿皂氣喘蘇子降氣痊注面赤浮腫謂之火鬱之喘宜瀉白散痰盛聲急謂之痰喘宜蘿皂丸無痰聲急謂之氣喘宜蘇子降氣湯方在諸氣門五味子湯黑錫丹腎氣湯人參理肺湯氣虛味麥參陳杏虛寒黑錫腎氣湯日久斂喘參桔味麻杏罌粟歸木香注五味子湯即五味子麥冬人參陳皮杏仁也人參理肺湯即人參桔梗五味子麻黃杏仁罌粟殼當歸木香也黑錫丹方在濁帶門腎氣湯方在虛勞門腫脹總括衛氣並脈循分肉內傷外感正邪攻外邪客脈為脈脹邪留分肉膚脹生注經曰衛氣之在身也常然並脈循分肉行陰陽相隨何病之有若其人內傷七情外感六氣飲食失節勞役過度則邪正相攻榮衛失和衛氣與風寒之邪客於脈中則為脈脹衛氣與風寒之邪留於分肉則為膚脹也諸脈脹單腹脹膚脹鼓脹脈脹筋起絡色變久成單腹末脫清膚脹𪔣𪔣初不硬纏綿氣鼓脹膨膨注脈脹之證腹筋起絡色變久而不已則成單腹脹四末脫瘦清冷也膚脹之證𪔣𪔣然初不堅硬纏綿不愈則成氣鼓脹滿膨膨急硬也腸覃石瘕外邪干衛客腸外腸覃月事以時行外邪干營客胞內石瘕經閉狀妊盈注風寒之邪不客於脈中分肉而干衛氣深入客於腸外僻而內著日以益大狀如懷子月事仍以時行名曰腸覃或干營氣深入客於胞中惡血留止日以益大狀如懷子月事不以時下名曰石瘕此皆生於女子在男子則為疝病也水脹石水風水皮厚色蒼多是氣皮薄色澤水濕成氣速安臥從上下水漸難眠咳喘徵石水少腹腫不喘風水面腫脛足同石水陰邪寒水結風水陽邪熱濕凝注凡腫脹之病皮厚色蒼者皆屬氣也皮薄色澤者皆屬水也氣陽也陽性急故為脹速每從上腫而漸下得以安臥邪在外也水陰也陰性遲故為脹漸每從下腫而漸上更有咳喘不得臥之徵也石水之證少腹腫滿水在下故不喘也上腫曰風下腫曰水故風水之證面與脛足同腫也然石水屬陰邪故曰寒結也風水屬陽邪故曰熱濕凝也脹滿水腫死證腹脹身熱及失血四末清脫瀉數行腫起四肢後入腹利旋滿腫腹筋青唇黑臍突陰囊腐缺盆脊背足心平脈大時絶或虛澀腫脹逢之卻可驚注腹脹身熱陽盛脹也若吐衄瀉血則陰亡矣四肢瘦冷陰盛脹也若數瀉不止則中脫矣先腫脹腹後散四肢者可治先腫四肢後歸入腹者不治腫脹之病多實服利下之藥旋消旋起則為正不勝邪亦不治腹筋青漲高起脹腫蒼黑臍腫突出陰囊腫腐缺盆脊背腫平足心腫平則五臟傷皆不治也脈大而時絶或虛澀細則氣血敗皆死脈也木香流氣飲膚脹脈脹通身脹單腹鼓脹四肢平膚脹木香流氣飲脈脹加薑黃撫芎注膚脹皮膚脹也脈脹經脈脹也此二脹皆通身脹也單腹脹四肢不脹鼓脹其脹如鼓此二脹皆腹脹四肢不脹也膚脹宜用木香流氣飲脈脹亦用此湯更加薑黃撫芎也方在諸氣門厚朴散下瘀血湯單腹鼓脹分氣血氣實腸覃厚朴榔木枳青陳遂大戟血實石瘕下瘀湯注單腹脹鼓脹當分氣血而治腸覃亦氣病也故同氣實脹者一治之皆用厚朴散即厚朴檳榔木香枳殼青皮陳皮甘遂大戟石瘕亦血病也故同血實脹者一治之宜用下瘀血湯即大黃桃仁䗪蟲甘遂也寒脹中滿分消湯熱脹中滿分消湯氣虛脹病分寒熱中滿分消有二方寒脹參耆歸苓朴半夏吳萸連二姜升柴烏麻青柏澤畢澄草蔻益木香熱縮六君知豬澤枳朴芩連乾薑黃注脹有虛實寒熱若脹而形氣虛少寒者宜用寒脹中滿分消湯即人參黃耆當歸茯苓厚朴半夏吳萸黃連乾薑生薑升麻柴胡川烏麻黃青皮黃柏澤瀉畢澄茄草豆蔻益智木香也脹而形氣虛少熱者宜用熱脹中滿分消湯即縮砂人參白朮茯苓炙草廣皮半夏知母豬苓澤瀉枳殼厚朴黃芩黃連乾薑薑黃也水腫治法上腫多風宜乎汗下腫多濕利水泉汗宜越婢加蒼朮利用貼臍琥珀丹外散內利疏鑿飲喘不得臥蘇葶先陽水熱浚濕神祐陰水實脾腎氣丸注從上腫者多外感風邪故宜乎汗從下腫者多內生濕邪故宜乎利水外散風水宜用越婢湯加蒼朮即麻黃石膏甘草蒼朮也內利水濕宜用貼臍等法一以巴豆去油四錢水銀粉二錢硫黃一錢研勻成餅先用新綿一片布臍上內餅外用帛縛時許自然瀉下惡水待下三五次去藥以粥補往日久形羸隔一日取一次一餅可救三五人一以鮮赤商陸根杵爛貼臍上以帛縛定水自小便出一以田螺四個大蒜五個車前子末三錢研成餅貼臍中以帕縛之少時尿利即愈或內服沉香琥珀丸即苦葶藶子真郁李仁防己沉香陳皮琥珀杏仁蘇子赤茯苓澤瀉麝香也若通身腫則當外散內利宜用疏鑿飲子兩解之若水盛上攻喘急不得臥則當先用蘇子葶藶丸以定喘即此二味等分為末棗肉丸陽水屬熱實者熱盛宜用大聖浚川散濕盛宜用舟車神祐丸以下之二方在醫宗必讀陰水屬寒虛者脾虛不食便軟宜用實脾飲腎虛脛足冷硬宜用腎氣丸疏鑿飲子茯苓導水湯水腫兩解疏鑿飲和劑茯苓導水湯疏鑿椒目赤小豆檳榔商陸木通羌秦艽大腹苓皮澤茯苓導水澤苓桑木香木瓜砂陳術蘇葉大腹麥檳榔注水腫外散內利兩解峻者疏鑿飲即椒目赤小豆檳榔商陸木通羌活秦艽大腹皮茯苓皮澤瀉也外散內利兩解和者茯苓導水湯即澤瀉茯苓桑皮木香木瓜砂仁陳皮白朮蘇葉大腹皮麥冬檳榔也實脾飲裡實自然尋浚祐裡虛實脾四君香木瓜附子大腹子厚朴草果炒乾姜投諸溫補俱無驗欲諸攻下又難當須行九補一攻法緩求淡食命多昌注裡實二便澀者宜用浚川散神祐丸裡虛二便通者宜用實脾飲即人參白朮茯苓炙草木香木瓜川附子大腹子厚朴草果炒乾姜也腫脹之病屬虛寒者自宜投諸溫補之藥而用之俱無效驗者虛中必有實邪也欲投諸攻下之藥而又難堪然不攻之終無法也須行九補一攻之法是用補養之藥九日俟其有可攻之機而一日用瀉下之藥攻之然攻藥亦須初起少少與之不勝病漸加之必審其藥與元氣相當逐邪而不傷正始為法也其後或補七日攻一日補五日攻一日補三日攻一日緩緩求之以愈為度若能戒鹽醬淡食百日多有生者
